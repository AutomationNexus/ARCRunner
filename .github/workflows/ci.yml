on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: automationnexus/.github/.github/workflows/ci.yml@v1
    with:
      branch-model: main-only
      has-security: false
    secrets:
      ci-bot-app-id: ${{ secrets.CI_BOT_APP_ID }}
      ci-bot-app-private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
