name: Build ARC runner image

# Rebuilds the custom self-hosted runner image and pushes it to GHCR.
#
# RUNNERS — read this:
#   * The FIRST image is built LOCALLY with Docker (bootstrap) — see README.
#     This private repo has no GitHub-hosted runner minutes, so `ubuntu-latest`
#     here fails at startup. That's expected; don't use hosted for this repo.
#   * This workflow therefore targets the SELF-HOSTED ARC pool (automationnexus-k3s),
#     whose runner pods have Docker-in-Docker — so future rebuilds run on your own
#     infra. It only works once ARC is live (§8–§10 of the guide).
#   * If you ever enable GitHub-hosted runners, switch runs-on back to ubuntu-latest.
#
# Manual-only (workflow_dispatch) so it never auto-fails on a push.

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write          # lets GITHUB_TOKEN push to ghcr.io/<org>/... (overrides the read-only default)

env:
  IMAGE: ghcr.io/automationnexus/arc-runner
  TAG: 2.335.1-ci1         # bump together with the FROM tag in Dockerfile.runner

jobs:
  build:
    runs-on: automationnexus-k3s   # your ARC pool (DinD). Needs ARC live first.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.runner
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
