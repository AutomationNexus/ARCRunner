name: Build ARC runner image

# Builds the custom self-hosted runner image and pushes it to GHCR.
#
# This repo (ARCRunner) is PUBLIC, so GitHub-hosted runners are free + unlimited here —
# the build runs on ubuntu-latest. (Only this tooling repo uses hosted; all 5 app repos
# run their CI on the self-hosted ARC pool.) Uses GITHUB_TOKEN only — no PAT.

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - Dockerfile.runner
      - .github/workflows/build-runner-image.yml

permissions:
  contents: read
  packages: write          # lets GITHUB_TOKEN push to ghcr.io/<org>/... (overrides the read-only default)

env:
  IMAGE: ghcr.io/automationnexus/arcrunner
  TAG: 2.335.1-ci1         # bump together with the FROM tag in Dockerfile.runner

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.runner
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
