name: Build ARC runner image

# Builds the custom self-hosted runner image and pushes it to GHCR.
#
# This repo (ARCRunner) is PUBLIC, so GitHub-hosted runners are free + unlimited here —
# the build runs on ubuntu-latest. (Split: the 2 PRIVATE app repos run on self-hosted ARC;
# the 3 PUBLIC app repos run on hosted ubuntu-latest too.) Uses GITHUB_TOKEN only — no PAT.

on:
  schedule:
    - cron: '0 2 * * *'    # 02:00 UTC nightly — picks up upstream :latest base
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - Dockerfile.runner
      - .github/workflows/build-runner-image.yml

permissions:
  contents: read
  packages: write          # lets GITHUB_TOKEN push to ghcr.io/<org>/... (overrides the read-only default)

env:
  IMAGE: ghcr.io/automationnexus/arcrunner
  # Runners pull :latest (auto-update on every push). Base is FROM ...:latest, so a rebuild
  # is not reproducible — each build also gets an immutable dated snapshot tag (computed below)
  # kept for rollback (snapshot-YYYYMMDD-<shortsha>).

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute snapshot tag
        id: snap
        run: echo "tag=snapshot-$(date -u +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.runner
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.snap.outputs.tag }}
