name: Build ARC runner image

# Builds the custom self-hosted runner image and pushes it to GHCR.
#
# This repo (ARCRunner) is PUBLIC, so GitHub-hosted runners are free + unlimited here —
# the build runs on ubuntu-latest. (Split: the 2 PRIVATE app repos run on self-hosted ARC;
# the 3 PUBLIC app repos run on hosted ubuntu-latest too.) Uses GITHUB_TOKEN only — no PAT.

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - Dockerfile.runner
      - .github/workflows/build-runner-image.yml

permissions:
  contents: read
  packages: write          # lets GITHUB_TOKEN push to ghcr.io/<org>/... (overrides the read-only default)

env:
  IMAGE: ghcr.io/automationnexus/arcrunner
  # Runners pull :latest (auto-update on every push). The version tag is an immutable
  # snapshot kept for rollback — bump it together with the FROM tag in Dockerfile.runner.
  VERSION_TAG: 2.335.1-ci1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.runner
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.VERSION_TAG }}
